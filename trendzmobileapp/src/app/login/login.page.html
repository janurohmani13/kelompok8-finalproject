<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-buttons slot="end">
      <ion-button fill="clear" class="header-link" (click)="goToSignup()">
        Create an Account
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding auth-content">
  <div class="title-section">
    <h1 class="main-title">LOGIN</h1>
    <p class="subtitle">enter your e-mail account and password to browse Tren-z collection</p>
  </div>

  <ion-list class="form-list ion-no-margin ion-no-padding">
    <ion-item lines="none" class="input-item">
      <ion-input type="email" placeholder="email" class="custom-input"></ion-input>
    </ion-item>

    <ion-item lines="none" class="input-item">
      <ion-input type="password" placeholder="password" class="custom-input"></ion-input>
    </ion-item>
  </ion-list>

  <ion-item lines="none" class="stay-signed-item">
    <ion-checkbox slot="start" class="stay-checkbox"></ion-checkbox>
    <ion-label class="stay-label">Stay signed in</ion-label>

    <ion-label class="forgot-label" slot="end" (click)="goToForgotPassword()">
      Forgot password?
    </ion-label>
  </ion-item>

  <div class="terms-and-auth">
    <ion-item lines="none" class="terms-item">
      <ion-label class="terms-label">
        By signing you accept our Terms & Conditions and Privacy Policy.
      </ion-label>
    </ion-item>

    <ion-button expand="block" class="auth-button" (click)="onLogin()">
      Login
    </ion-button>
  </div>

</ion-content>
